name: Release

# Publishes to PyPI when a GitHub Release is published, via PyPI Trusted
# Publishing (OIDC) — no API tokens or secrets to store.
#
# One-time setup on pypi.org (project → Publishing): add a GitHub publisher for
#   owner=swarmproof, repo=exactly-once, workflow=release.yml, environment=pypi
# Until that exists, the publish step will fail; re-run this workflow after setup.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
